name: Douyin/TikTok Auto Download

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL to download'
        required: false
        default: ''
      file:
        description: 'File with URLs (one per line)'
        required: false
        default: 'urls.txt'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download videos
        run: |
          if [ -n "${{ github.event.inputs.url }}" ]; then
            python3 scripts/savetik-dl.py "${{ github.event.inputs.url }}"
          else
            python3 scripts/savetik-dl.py --file "${{ github.event.inputs.file }}"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_id }}
          path: ./downloads/
          retention-days: 7
