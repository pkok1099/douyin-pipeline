name: Douyin/TikTok Download

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # 4x daily
  workflow_dispatch:
    inputs:
      url:
        description: 'Video URL (TikTok or Douyin)'
        required: false
        default: ''
      file:
        description: 'File with URLs (one per line)'
        required: false
        default: 'urls.txt'
      count:
        description: 'Max videos to download'
        required: false
        default: '5'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Download videos via Savetik
        env:
          URL: ${{ github.event.inputs.url }}
          FILE: ${{ github.event.inputs.file }}
          COUNT: ${{ github.event.inputs.count }}
        run: |
          mkdir -p downloads

          if [ -n "$URL" ]; then
            echo "=== Downloading single URL ==="
            python3 scripts/savetik-dl.py "$URL"
          elif [ -f "$FILE" ]; then
            echo "=== Downloading from file: $FILE ==="
            head -n "$COUNT" "$FILE" > /tmp/urls_to_dl.txt
            python3 scripts/savetik-dl.py --file /tmp/urls_to_dl.txt
          else
            echo "=== No URLs provided, using default ==="
            echo "https://www.tiktok.com/@eveberliana/video/7537630830340885766" > /tmp/urls_to_dl.txt
            python3 scripts/savetik-dl.py --file /tmp/urls_to_dl.txt
          fi

          echo "=== Downloaded files ==="
          ls -la downloads/ 2>/dev/null || echo "No files"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_id }}
          path: downloads/*.mp4
          retention-days: 7
          if-no-files-found: warn
